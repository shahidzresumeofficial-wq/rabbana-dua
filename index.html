<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>۴۰ ربنا کی دعائیں</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Noto+Nastaliq+Urdu:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold:     #C9A84C;
    --gold-lt:  #E8C96A;
    --green:    #1B6B4A;
    --green-dk: #0E3D2B;
    --teal:     #1A7A6E;
    --cream:    #FDF6E3;
    --ink:      #1C1C1C;
    --card-bg:  #FFFFFF;
    --shadow:   0 4px 24px rgba(0,0,0,0.10);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Noto Nastaliq Urdu', serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    direction: rtl;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, var(--green-dk) 0%, var(--green) 50%, var(--teal) 100%);
    position: relative;
    overflow: hidden;
    padding: 60px 20px 50px;
    text-align: center;
  }

  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 50%, rgba(201,168,76,0.18) 0%, transparent 60%),
      radial-gradient(circle at 80% 30%, rgba(201,168,76,0.12) 0%, transparent 50%);
  }

  .header-ornament {
    font-size: 2.6rem;
    color: var(--gold);
    letter-spacing: 8px;
    margin-bottom: 16px;
    display: block;
    position: relative;
  }

  header h1 {
    font-family: 'Amiri', serif;
    font-size: clamp(2.2rem, 6vw, 4rem);
    color: #FFFFFF;
    line-height: 1.3;
    position: relative;
    text-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }

  header h1 span {
    color: var(--gold-lt);
    display: block;
    font-size: clamp(1.3rem, 3.5vw, 2rem);
    margin-top: 8px;
    font-weight: 400;
  }

  .header-rule {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin: 22px auto 0;
    max-width: 340px;
    position: relative;
  }

  .header-rule::before,
  .header-rule::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .header-rule-diamond {
    color: var(--gold);
    font-size: 1rem;
  }

  /* ── BISMILLAH ── */
  .bismillah-wrap {
    text-align: center;
    padding: 32px 20px 24px;
    background: linear-gradient(180deg, #e8f5f0 0%, var(--cream) 100%);
  }

  .bismillah {
    font-family: 'Amiri', serif;
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    color: var(--green-dk);
    line-height: 1.8;
  }

  /* ── COUNTER BAND ── */
  .count-band {
    background: var(--green);
    color: #fff;
    text-align: center;
    padding: 12px;
    font-size: 1rem;
    letter-spacing: 1px;
  }

  .count-band strong { color: var(--gold-lt); }

  /* ── GRID ── */
  .grid {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 20px 60px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 28px;
  }

  /* ── CARD ── */
  .card {
    background: var(--card-bg);
    border-radius: 18px;
    box-shadow: var(--shadow);
    overflow: hidden;
    transition: transform 0.25s, box-shadow 0.25s;
    display: flex;
    flex-direction: column;
    border: 1px solid rgba(201,168,76,0.18);
  }

  .card:hover {
    transform: translateY(-5px);
    box-shadow: 0 12px 36px rgba(0,0,0,0.14);
  }

  .card-header {
    background: linear-gradient(135deg, var(--green) 0%, var(--teal) 100%);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card-num {
    background: var(--gold);
    color: var(--green-dk);
    font-family: 'Amiri', serif;
    font-weight: 700;
    font-size: 1rem;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .card-ref {
    color: rgba(255,255,255,0.85);
    font-size: 0.78rem;
    text-align: left;
    direction: ltr;
    font-family: 'Amiri', serif;
  }

  .card-ref strong {
    color: var(--gold-lt);
    display: block;
    font-size: 0.85rem;
  }

  .card-body {
    padding: 22px 22px 18px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .arabic {
    font-family: 'Amiri', serif;
    font-size: clamp(1.15rem, 2.5vw, 1.45rem);
    color: var(--green-dk);
    line-height: 2.2;
    text-align: center;
    border-bottom: 1px dashed rgba(201,168,76,0.4);
    padding-bottom: 14px;
  }

  .urdu {
    font-family: 'Noto Nastaliq Urdu', serif;
    font-size: clamp(0.9rem, 2vw, 1.05rem);
    color: #3a3a3a;
    line-height: 2.4;
    text-align: right;
  }

  .urdu-label {
    font-size: 0.72rem;
    color: var(--teal);
    font-weight: 600;
    display: block;
    margin-bottom: 4px;
    text-align: right;
  }

  /* ── FOOTER ── */
  footer {
    background: var(--green-dk);
    color: rgba(255,255,255,0.7);
    text-align: center;
    padding: 28px 20px;
    font-size: 0.85rem;
    line-height: 2;
  }

  footer strong { color: var(--gold-lt); }

  /* ── SCROLL TOP ── */
  .scroll-top {
    position: fixed;
    bottom: 24px;
    left: 24px;
    background: var(--gold);
    color: var(--green-dk);
    border: none;
    border-radius: 50%;
    width: 46px;
    height: 46px;
    font-size: 1.3rem;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(0,0,0,0.2);
    transition: opacity 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; gap: 20px; }
  }
</style>
</head>
<body>

<header>
  <span class="header-ornament">✦ ✦ ✦</span>
  <h1>
    ۴۰ ربنا کی دعائیں
    <span>قرآن مجید سے منتخب دعائیں — مع اردو ترجمہ</span>
  </h1>
  <div class="header-rule"><span class="header-rule-diamond">❖</span></div>
</header>

<div class="bismillah-wrap">
  <div class="bismillah">بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْمِ</div>
</div>

<div class="count-band">
  قرآن مجید میں <strong>۴۰</strong> مبارک دعائیں جو <strong>رَبَّنَا</strong> سے شروع ہوتی ہیں
</div>

<div class="grid" id="duas"></div>

<footer>
  <strong>۴۰ ربنا دعائیں — قرآن مجید</strong><br>
  یہ دعائیں قرآن کریم کی مختلف سورتوں سے لی گئی ہیں<br>
  اللہ تعالیٰ ہم سب کی دعائیں قبول فرمائے ۔ آمین
</footer>

<button class="scroll-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="اوپر جائیں">↑</button>

    <div class="card-header">
      <div class="card-num">${toUrduNum(num)}</div>
      <div class="card-ref">
        <strong>${d.surah}</strong>
        ${d.ref}
      </div>
    </div>
    <div class="card-body">
      <div class="arabic">${d.arabic}</div>
      <div>
        <span class="urdu-label">اردو ترجمہ</span>
        <div class="urdu">${d.urdu}</div>
      </div>
    </div>
  `;
  grid.appendChild(card);
